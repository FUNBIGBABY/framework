version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        # Firebase Configuration (passed from .env file)
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
    
    image: valorie-framework-builder:latest
    container_name: valorie-app
    
    ports:
      - "8000:8000"
    
    environment:
      # Server Configuration
      - PORT=8000
      - WORKERS=1
      
      # LLM API Configuration
      # Legacy GCP/self-hosted Cloud LLM defaults are intentionally disabled.
      # Phase 3 will route generation through the DeepSeek provider.
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL_DEFAULT=${DEEPSEEK_MODEL_DEFAULT:-deepseek-v4-flash}
      - DEEPSEEK_MODEL_REASONING=${DEEPSEEK_MODEL_REASONING:-deepseek-v4-pro}
      - DEEPSEEK_THINKING_MODE=${DEEPSEEK_THINKING_MODE:-false}
      - ENABLE_LEGACY_LLM=${ENABLE_LEGACY_LLM:-false}
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
