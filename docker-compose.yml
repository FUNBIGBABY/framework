version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: framework-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-framework}
      POSTGRES_USER: ${POSTGRES_USER:-framework}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-framework} -d $${POSTGRES_DB:-framework}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    
    image: framework-builder:latest
    container_name: framework-app
    
    ports:
      - "8000:8000"

    depends_on:
      - db
    
    environment:
      # Server Configuration
      - PORT=8000
      - WORKERS=1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://framework:change-me@db:5432/framework}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - APP_BASE_DOMAIN=${APP_BASE_DOMAIN:-}
      - APP_NAME=${APP_NAME:-Personal AI Framework Studio}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-}
      
      # LLM API Configuration
      # Legacy GCP/self-hosted Cloud LLM defaults are intentionally disabled.
      # Generation routes through the DeepSeek provider by default.
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL_DEFAULT=${DEEPSEEK_MODEL_DEFAULT:-deepseek-v4-flash}
      - DEEPSEEK_MODEL_REASONING=${DEEPSEEK_MODEL_REASONING:-deepseek-v4-pro}
      - DEEPSEEK_THINKING_MODE=${DEEPSEEK_THINKING_MODE:-false}
      - ENABLE_LEGACY_LLM=${ENABLE_LEGACY_LLM:-false}
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
